name: proximity_alert
description: A new Flutter project for iOS proximity alerts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  webview_flutter: ^4.7.0
  shared_preferences: ^2.2.3
  audioplayers: ^6.0.0
  flutter_local_notifications: ^17.1.2
  flutter_background_service: ^5.0.1
  latlong2: ^0.9.1
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.6
  permission_handler: ^11.3.1
  file_picker: ^8.0.0
  webview_cookie_manager: ^2.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/star_labs_alarm.mp3
