workflows:
  ios-release:
    name: iOS Release Build (No Shorebird)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Set up code signing
        script: |
          # Per ora saltiamo la firma reale se non hai certificati Apple
          # Se desideri usare certificati reali, Codemagic li gestirà tramite variabili d'ambiente
          echo "Building without real signing for testing..."
      - name: Flutter pub get
        script: |
          flutter pub get
      - name: Build iOS and Manual Package IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir -p build/ios/iphoneos/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r ProximityAlert.ipa Payload
          mkdir -p ../ipa
          cp ProximityAlert.ipa ../ipa/
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - morterix01@gmail.com 
        notify:
          success: true
          failure: true
